name: Demo Activity Generator

on:
  workflow_dispatch:          # adds a "Run workflow" button (your manual burst)
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 10 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "0 16 * * 1-5"
permissions:
  contents: write             # push commits / merge PRs
  pull-requests: write        # open & review PRs 
  deployments: write          # create deployments & statuses

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate demo activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: main      # change if your default branch is not "main"
        run: bash scripts/generate-demo-activity.sh
